services:
  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: nacos
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - microservice-net

  user-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.user
    image: microservice/user-service:latest
    container_name: user-service
    environment:
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      - nacos
    networks:
      - microservice-net

  order-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.order
    image: microservice/order-service:latest
    container_name: order-service
    environment:
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      - nacos
      - user-service
    networks:
      - microservice-net

  gateway-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    image: microservice/gateway-server:latest
    container_name: gateway-server
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      - nacos
      - user-service
      - order-service
    networks:
      - microservice-net

networks:
  microservice-net:
    driver: bridge
