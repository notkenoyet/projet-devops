apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: microservice
  labels:
    app: nacos
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8848
      targetPort: 8848
    - name: grpc
      port: 9848
      targetPort: 9848
  selector:
    app: nacos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: microservice
  labels:
    app: nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.2.0
          ports:
            - containerPort: 8848
            - containerPort: 9848
          env:
            - name: MODE
              value: standalone
            - name: JVM_XMS
              value: 256m
            - name: JVM_XMX
              value: 256m
          readinessProbe:
            httpGet:
              path: /nacos/
              port: 8848
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nacos/
              port: 8848
            initialDelaySeconds: 60
            periodSeconds: 20
