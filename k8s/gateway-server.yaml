apiVersion: v1
kind: Service
metadata:
  name: gateway-server
  namespace: microservice
  labels:
    app: gateway-server
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: gateway-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-server
  namespace: microservice
  labels:
    app: gateway-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-server
  template:
    metadata:
      labels:
        app: gateway-server
    spec:
      containers:
        - name: gateway-server
          image: microservice/gateway-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: NACOS_SERVER_ADDR
              value: nacos.microservice.svc.cluster.local:8848
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
